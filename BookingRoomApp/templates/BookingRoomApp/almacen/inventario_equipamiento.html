{% extends "../base.html" %} {% block inicio %}
<style>

    body {
        background-color: #f2f2f2;
        font-family: Arial, sans-serif;
        margin: 0;
    }

    .container {
        width: 80%;
        margin: 50px auto;
    }

    .titulo {
        font-weight: bold;
        margin-bottom: 20px;
    }

    .contenedor {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    .fila {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: center;
    }

    th {
        background-color: #eeeeee;
    }

    .btn-verde {
        background-color: #2ea043;
        color: white;
        padding: 6px 12px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
    }

    .btn-verde:hover {
        background-color: #1c7c31;
    }

    .modal {
        display: none;
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
    }

    .modal-content {
        background: white;
        width: 420px;
        margin: 8% auto;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 0 10px #444;
        position: relative;
    }

    .close {
        position: absolute;
        right: 12px;
        top: 8px;
        font-size: 26px;
        cursor: pointer;
    }

    .close:hover {
        color: red;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 150px 1fr;
        gap: 12px;
        align-items: center;
        margin-top: 20px;
    }

    .btn-guardar {
        background-color: #2ea043;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
    }

    .guardar {
        text-align: center;
        margin-top: 20px;
    }

</style>

</head>

<body>
<div class="container">
<h2 class="titulo">Equipamientos</h2>
<div class="contenedor">
    <div class="fila">
        <input type="text" placeholder="Buscar equipamiento">

        <select>
            <option>Estado</option>
            <option>Disponible</option>
            <option>No disponible</option>
        </select>

        <select>
            <option>Seleccione tipo</option>
            <option>oficina</option>
            <option>Carnaval</option>
        </select>

    </div>

    <table>
        <thead>
            <tr>
                <th>Indice</th>
                <th>Servicio</th>
                <th>Tipo</th>
                <th>Descripcion</th>
                <th>Costo</th>
                <th>Stock</th>
                <th>Estado</th>
                <th>Cambiar estado</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>Nose</td>
                <td>Ejecutivo</td>
                <td>Quien sabe</td>
                <td>2</td>
                <td>0</td>
                <td>Disponible</td>

                <td>
                    <button class="btn-verde" onclick="abrirModal()">↑↓</button>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</div>

<div id="modalEstado" class="modal">
<div class="modal-content">
    <span class="close" onclick="cerrarModal()">×</span>

    <h3 style="text-align:center;">INFORME DE LA RESERVACION</h3>
    <div class="form-grid">

        <label>Cantidad actual</label>
        <input type="number" value="50">

        <label>Cantidad a cambiar</label>
        <input type="number">

        <label>Cambiar estado</label>

        <select>
            <option>Disponible</option>
            <option>No disponible</option>
        </select>
    </div>

    <div class="guardar">
        <button class="btn-guardar">Guardar</button>
    </div>

</div>

</div>

<script>

function abrirModal() {
    document.getElementById("modalEstado").style.display = "block";
}

function cerrarModal() {
    document.getElementById("modalEstado").style.display = "none";
}

window.onclick = function(event) {
    let modal = document.getElementById("modalEstado");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}

</script>

{% endblock inicio %}
