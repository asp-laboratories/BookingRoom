{% extends "BookingRoomApp/base/base.html" %}
{% load static %}

{% block inicio %}

<link rel="stylesheet" href="{% static 'BookingRoomApp/css/administrador/registro_administrador.css' %}">

<div class="administrador-contenido">
  <h1 class="titulo-seccion">Servicios</h1>
  <h2>Registrar servicios</h2>

  <div class="administrador-formularios">
    <form class="administrador-seccionFlex">
      <div class="administrador-seccionFlex">
        <label class="administrador-label"
          >Nombre:
          <input
            type="text"
            placeholder="Nombre"
            name="nameServicio"
            class="administrador-input"
            required
          />
        </label>

        <label class="administrador-label"
          >Tipo:
          <div class="administrador-seccionTipos">
            <select name="rolSeleccionado" id="itemAsig" class="administrador-select" required>
              <option value disabled selected hidden>Seleccionar</option>
              <option value="1">Recepcionista</option>
              <option value="2">Almacenista</option>
              <option value="3">Coordinador</option>
            </select>
            <button type="button" class="administrador-botonCrearTipo">Crear Tipo</button>
          </div>
        </label>

        <label class="administrador-label"
          >Descripcion:
          <br />
          <input
            type="text"
            placeholder="Descripcion"
            name="descripcion"
            class="administrador-input"
            required
          />
        </label>

        <label class="administrador-label"
          >Costo:
          <br />
          <input
            type="text"
            placeholder="Costo"
            name="costoServicio"
            class="administrador-input"
            required
          />
        </label>
      </div>
      <button class="administrador-paGuarar" type="submit">Guardar</button>
    </form>
  </div>

  <form class="administrador-seccionBusq">
    <h3 class="administrador-tituloSeccion">Busqueda</h3>

    <div class="administrador-entradaBusquedas">
      <input
        type="text"
        placeholder="Buscar servicio"
        name="busqTraba"
        class="administrador-input"
        required
      />

      <button class="administrador-busqAlgo" type="submit">Buscar</button>
    </div>
  </form>

  <div class="administrador-tablita">
    <table class="administrador-tabla">
      <thead class="administrador-thead">
        <tr>
          <th class="administrador-th">Indice</th>
          <th class="administrador-th">Servicio</th>
          <th class="administrador-th">Tipo</th>
          <th class="administrador-th">Descripcion</th>
          <th class="administrador-th">Costo</th>
          <th class="administrador-th">Disposicion</th>
          <th class="administrador-th">Editar</th>
        </tr>
      </thead>

      <tbody class="administrador-tbody">
        <tr>
          <td class="administrador-td">1</td>
          <td class="administrador-td">Servicio A</td>
          <td class="administrador-td">Tipo 1</td>
          <td class="administrador-td">Descripcion del servicio</td>
          <td class="administrador-td">$500</td>
          <td class="administrador-td">Activo</td>
          <td class="administrador-td"><img class="administrador-img" src="/document.png" /></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

{% endblock inicio %}
