{% load static %}

<div id="modal-crear-tipo" class="crear-tipo-modal">
  <div class="crear-tipo-content">
    <div class="crear-tipo-header">
      <h3 id="crear-tipo-titulo">Crear Nuevo Tipo</h3>
      <span class="crear-tipo-close" onclick="cerrarModalCrearTipo()">&times;</span>
    </div>
    <div class="crear-tipo-body">
      <form id="form-crear-tipo" method="POST">
        {% csrf_token %}
        <input type="hidden" name="tipo" id="input-tipo">
        <label class="crear-tipo-label">
          Nombre del tipo:
          <input type="text" name="nombre_tipo" class="crear-tipo-input" required placeholder="Ej: Sillas, Mesas, Audio">
        </label>
        <div class="crear-tipo-checkbox">
          <input type="checkbox" name="disposicion" id="disposicion-tipo" checked>
          <label for="disposicion-tipo">Activo</label>
        </div>
      </form>
    </div>
    <div class="crear-tipo-footer">
      <button type="button" class="crear-tipo-btn crear-tipo-btn-cancelar" onclick="cerrarModalCrearTipo()">Cancelar</button>
      <button type="button" class="crear-tipo-btn crear-tipo-btn-guardar" onclick="guardarTipo()">Guardar</button>
    </div>
  </div>
</div>

<script>
let urlCrearTipo = '{% url "crear_tipo" %}';
let tipoActual = '';

function abrirModalCrearTipo(tipo) {
  tipoActual = tipo;
  document.getElementById('crear-tipo-titulo').textContent = 'Crear Nuevo ' + tipo;
  document.getElementById('input-tipo').value = tipo;
  document.getElementById('modal-crear-tipo').classList.add('mostrar');
}

function cerrarModalCrearTipo() {
  document.getElementById('modal-crear-tipo').classList.remove('mostrar');
  document.querySelector('#form-crear-tipo').reset();
}

function guardarTipo() {
  const nombre = document.querySelector('#form-crear-tipo input[name="nombre_tipo"]').value;
  if (!nombre.trim()) {
    alert('Por favor ingresa un nombre para el tipo');
    return;
  }
  
  abrirModalConfirmar(
    'Confirmar creación',
    '¿Estás seguro de que deseas crear el tipo "' + nombre + '"?',
    function() {
      ejecutarCrearTipo();
    }
  );
}

function ejecutarCrearTipo() {
  const form = document.querySelector('#form-crear-tipo');
  const formData = new FormData(form);
  
  fetch(urlCrearTipo, {
    method: 'POST',
    body: formData,
    credentials: 'same-origin'
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      alert(data.message || 'Tipo creado exitosamente');
      cerrarModalCrearTipo();
      location.reload();
    } else {
      alert(data.message || 'Error al crear tipo');
    }
  })
  .catch(error => {
    alert('Error: ' + error);
  });
}

document.addEventListener('DOMContentLoaded', function() {
  const modal = document.getElementById('modal-crear-tipo');
  if (modal) {
    modal.addEventListener('click', function(e) {
      if (e.target === modal) {
        cerrarModalCrearTipo();
      }
    });
  }
});
</script>

<style>
.crear-tipo-modal {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.4);
}

.crear-tipo-modal.mostrar {
  display: block;
}

.crear-tipo-content {
  background: white;
  width: 400px;
  max-width: 90%;
  margin: 10% auto;
  padding: 0;
  border-radius: 12px;
  box-shadow: 0 0 10px #444;
  position: relative;
}

.crear-tipo-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  border-bottom: 1px solid #eee;
}

.crear-tipo-header h3 {
  margin: 0;
  font-size: 1.2rem;
  color: #333;
}

.crear-tipo-close {
  font-size: 28px;
  cursor: pointer;
  color: #888;
}

.crear-tipo-close:hover {
  color: red;
}

.crear-tipo-body {
  padding: 20px;
}

.crear-tipo-label {
  display: block;
  margin-bottom: 15px;
  font-weight: 500;
  color: #333;
}

.crear-tipo-input {
  display: block;
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 14px;
  box-sizing: border-box;
}

.crear-tipo-input:focus {
  outline: none;
  border-color: var(--color-primario);
}

.crear-tipo-checkbox {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}

.crear-tipo-checkbox input {
  width: 18px;
  height: 18px;
}

.crear-tipo-checkbox label {
  color: #555;
  cursor: pointer;
}

.crear-tipo-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 15px 20px;
  border-top: 1px solid #eee;
}

.crear-tipo-btn {
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  font-size: 14px;
}

.crear-tipo-btn-cancelar {
  background-color: #e0e0e0;
  color: #333;
}

.crear-tipo-btn-cancelar:hover {
  background-color: #ccc;
}

.crear-tipo-btn-guardar {
  background-color: var(--color-boton-guardar);
  color: white;
}

.crear-tipo-btn-guardar:hover {
  background-color: #157347;
}
</style>
